<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='signup.css') }}">
</head>
<body>

<div class="container">

    <div class="left-side">
        <h1>Photography Planner</h1>
        <p>Plan. Capture. Create.</p>
    </div>

    <div class="right-side">

        <div class="signup-card">

            <h2>Welcome Back</h2>

            <form method="POST">

                <input
                    type="text"
                    name="username"
                    placeholder="Username"
                    required>

                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required>

                <button type="submit">
                    Login
                </button>

            </form>

            <a href="/signup">
                Don't have an account? Sign Up
            </a>

        </div>

    </div>

</div>

</body>
</html>
