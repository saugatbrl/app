<!DOCTYPE html>
<html>
<head>
    <title>Create Account</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='signup.css') }}">
</head>
<body>

<div class="container">

    <div class="left-side">
        <h1>Photography Planner</h1>
        <p>Plan. Capture. Create.</p>
    </div>

    <div class="right-side">

        <div class="signup-card">

            <h2>Create Account</h2>

            <form method="POST">

                <input type="text"
                       name="username"
                       placeholder="Username"
                       required>

                <input type="email"
                       name="email"
                       placeholder="Email"
                       required>

                <input type="password"
                       name="password"
                       placeholder="Password"
                       required>

                <button type="submit">
                    Sign Up
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
